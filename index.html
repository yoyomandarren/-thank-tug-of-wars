<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拔河測試版</title>
</head>
<body>

<h1>雙向拔河測試</h1>

<div>
  <h2>紅隊 ❤️</h2>
  <p id="text-red">點擊抽題</p>
  <button onclick="draw('red')">抽題</button>
  <button onclick="pull('red')" id="pull-red" style="display:none;">拉！</button>
  分數：<span id="score-red">0</span>
</div>

<div>
  <h2>藍隊 💙</h2>
  <p id="text-blue">點擊抽題</p>
  <button onclick="draw('blue')">抽題</button>
  <button onclick="pull('blue')" id="pull-blue" style="display:none;">拉！</button>
  分數：<span id="score-blue">0</span>
</div>

<div>
  <p id="winner"></p>
</div>

<script>
let rope = 50;
let scoreRed = 0;
let scoreBlue = 0;
const STRENGTH = 10;
const questions = ["感謝今天的小事", "感謝朋友", "最近讓你開心的事"];

function draw(team){
  const q = questions[Math.floor(Math.random()*questions.length)];
  document.getElementById("text-"+team).innerText = "「"+q+"」";
  document.getElementById("pull-"+team).style.display = "inline";
}

function pull(team){
  if(team==="red"){ rope -= STRENGTH; scoreRed++; document.getElementById("score-red").innerText=scoreRed; }
  else { rope += STRENGTH; scoreBlue++; document.getElementById("score-blue").innerText=scoreBlue; }

  document.getElementById("pull-red").style.display = "none";
  document.getElementById("pull-blue").style.display = "none";

  if(rope<=10){ document.getElementById("winner").innerText="紅隊獲勝！"; }
  if(rope>=90){ document.getElementById("winner").innerText="藍隊獲勝！"; }
}
</script>

</body>
</html>
